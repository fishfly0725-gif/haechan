<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-1360936154185310">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1360936154185310"
     crossorigin="anonymous"></script>
    <title>로또 번호 추첨</title>
    <style>
        :root {
            --bg-color: #f0f0f0;
            --text-color: #333;
            --card-bg: #fff;
            --btn-bg: #4CAF50;
            --btn-hover: #45a049;
            --input-bg: #fff;
            --input-border: #ccc;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #f0f0f0;
            --card-bg: #2d2d2d;
            --btn-bg: #2e7d32;
            --btn-hover: #1b5e20;
            --input-bg: #3d3d3d;
            --input-border: #555;
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 50px 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        h1, h2 {
            color: var(--text-color);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .controls {
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: var(--btn-bg);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            background-color: var(--btn-hover);
        }

        #theme-toggle {
            background-color: #666;
        }

        #numbers {
            margin: 20px 0;
            font-size: 24px;
            font-weight: bold;
            min-height: 54px;
        }

        .number {
            display: inline-block;
            width: 40px;
            height: 40px;
            line-height: 40px;
            margin: 5px;
            border-radius: 50%;
            background-color: var(--card-bg);
            border: 2px solid var(--text-color);
            color: var(--text-color);
            transition: all 0.3s;
        }

        .contact-form {
            margin-top: 50px;
            padding: 30px;
            background-color: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: left;
        }

        .contact-form h2 {
            margin-top: 0;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            background-color: var(--input-bg);
            color: var(--text-color);
            box-sizing: border-box;
        }

        .form-group textarea {
            height: 100px;
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="controls">
            <button id="theme-toggle" onclick="toggleTheme()">테마 변경</button>
        </div>
        <h1>로또 번호 추첨</h1>
        <p>버튼을 클릭하여 6개의 로또 번호를 추첨하세요!</p>
        <button onclick="generateNumbers()">번호 추첨</button>
        <div id="numbers"></div>

        <div class="contact-form">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/mwvykkgl" method="POST">
                <div class="form-group">
                    <label for="name">이름/업체명</label>
                    <input type="text" id="name" name="name" required placeholder="홍길동">
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" required placeholder="제휴 문의 내용을 입력해 주세요."></textarea>
                </div>
                <!-- Formspree 스팸 방지 및 결과 페이지 설정 -->
                <input type="hidden" name="_subject" value="새로운 제휴 문의가 도착했습니다!">
                <button type="submit" class="submit-btn">문의 보내기</button>
            </form>
        </div>

        <div id="disqus_container" style="margin-top: 50px; padding: 20px; background-color: var(--card-bg); border-radius: 10px;">
            <div id="disqus_thread"></div>
            <script>
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://haechan1.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        // 초기 테마 설정
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        function generateNumbers() {
            const numbers = [];
            while (numbers.length < 6) {
                const num = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(num)) {
                    numbers.push(num);
                }
            }
            numbers.sort((a, b) => a - b);
            displayNumbers(numbers);
        }

        function displayNumbers(numbers) {
            const container = document.getElementById('numbers');
            container.innerHTML = '';
            numbers.forEach(num => {
                const div = document.createElement('div');
                div.className = 'number';
                div.textContent = num;
                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
